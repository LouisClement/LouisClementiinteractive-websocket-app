<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUTABILIS - Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #3c5a99;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .title {
            color: black;
            text-align: center;
            font-size: 4em;
            margin-bottom: 30px;
            font-family: 'Times New Roman', serif;
        }
        .status-indicator {
            color: white;
            text-align: center;
            padding: 10px;
            margin-bottom: 20px;
            background-color: rgba(0,0,0,0.2);
            border-radius: 10px;
            font-weight: bold;
        }
        .admin-buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .admin-row {
            display: flex;
            gap: 20px;
        }
        .button {
            width: 100px;
            height: 100px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .button:active {
            transform: scale(0.95);
        }
        .button.round {
            border-radius: 50%;
        }
        .button.large {
            width: 220px;
            height: 120px;
        }
        .button.pink {
            background-color: #d53f8c;
        }
        .button.orange {
            background-color: #ed8936;
        }
        .button.blue {
            background-color: #3182ce;
        }
        .button.green {
            background-color: #38a169;
        }
        .button.red {
            background-color: #e53e3e;
        }
        .button.yellow {
            background-color: #d69e2e;
        }
        .button svg {
            width: 50%;
            height: 50%;
            fill: white;
        }
    </style>
</head>

    <script>
        // Script pour la page admin avec gestion des boutons disponibles
        const wsHost = window.location.hostname === 'localhost' ? '127.0.0.1' : window.location.hostname;
        const ws = new WebSocket(`ws://${wsHost}:3000?admin=true`);
        const statusDiv = document.getElementById('status');
        statusDiv.style.fontWeight = 'bold';
        let availableButtons = [1, 2, 3, 4, 5, 6, 7, 8]; // Par défaut, tous disponibles

        ws.onopen = () => {
            console.log('Admin connecté au serveur WebSocket');
            statusDiv.textContent = 'Connecté';
            statusDiv.style.color = '#28a745';
            ws.send(JSON.stringify({ type: 'joinRoom', roomId: 'mutabilis' }));
        };

        ws.onclose = () => {
            console.log('Admin déconnecté du serveur WebSocket');
            statusDiv.textContent = 'Déconnecté. Rechargez la page.';
            statusDiv.style.color = '#dc3545';
        };

        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                if (data.type === 'userState') {
                    // L'admin reçoit la liste des boutons qu'il peut utiliser
                    availableButtons = data.buttons;
                    updateButtonStates();
                }
            } catch (error) {
                console.error('Error processing message:', error);
            }
        };

        function updateButtonStates() {
            document.querySelectorAll('.button').forEach(button => {
                const buttonId = parseInt(button.dataset.id);
                if (availableButtons.includes(buttonId)) {
                    button.style.display = 'flex';
                } else {
                    button.style.display = 'none';
                }
            });
        }

        // Seuls les boutons disponibles sont affichés et cliquables pour l'admin
        document.querySelectorAll('.button').forEach(button => {
            button.addEventListener('click', () => {
                const buttonId = parseInt(button.dataset.id);
                if (ws.readyState === WebSocket.OPEN && availableButtons.includes(buttonId)) {
                    ws.send(JSON.stringify({ buttonId: buttonId }));
                }
            });
        });
    </script>

</html>
