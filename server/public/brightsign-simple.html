<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUTABILIS - BrightSign Simple</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #2b6186, #1a4d6b);
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .title {
            color: #ffffff;
            text-align: center;
            font-size: 5em;
            margin-bottom: 30px;
            font-family: 'Times New Roman', serif;
            font-weight: bold;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            letter-spacing: 3px;
        }
        
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 90vw;
            height: 70vh;
        }
        
        .top-buttons {
            display: flex;
            justify-content: space-around;
            gap: 30px;
            margin-bottom: 40px;
            width: 100%;
            max-width: 1000px;
        }
        
        .statue-container {
            position: relative;
            width: 700px;
            height: 1000px;
            background: linear-gradient(45deg, #1a4d6b, #2b6186);
            border: 5px solid #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        /* Motif de fond pour remplacer l'image */
        .statue-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 30% 20%, rgba(255,255,255,0.1) 2px, transparent 2px),
                radial-gradient(circle at 70% 80%, rgba(255,255,255,0.1) 2px, transparent 2px),
                linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.05) 50%, transparent 60%);
            background-size: 50px 50px, 80px 80px, 100% 100%;
        }
        
        .statue-container::after {
            content: 'MUTABILIS';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            font-size: 4em;
            color: rgba(255,255,255,0.1);
            font-weight: bold;
            letter-spacing: 5px;
            z-index: 0;
        }
        
        .button {
            width: 100px;
            height: 100px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            font-size: 20px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10;
        }
        
        .button:hover {
            transform: scale(1.15);
            box-shadow: 0 12px 24px rgba(0,0,0,0.4);
        }
        
        .button:active {
            transform: scale(0.9);
        }
        
        .button.pink {
            background: linear-gradient(135deg, #e91e63, #ad1457);
            box-shadow: 0 8px 16px rgba(233, 30, 99, 0.4);
        }
        
        .button.orange {
            background: linear-gradient(135deg, #ff9800, #e65100);
            box-shadow: 0 8px 16px rgba(255, 152, 0, 0.4);
        }
        
        .statue-container .button.transparent {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 4px solid rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            z-index: 10;
        }
        
        .statue-container .button.transparent:hover {
            transform: scale(1.2);
            background: rgba(255, 255, 255, 0.4);
        }
        
        .statue-container .button.transparent.red {
            background: rgba(255, 0, 0, 0.3);
            border-color: rgba(255, 0, 0, 0.8);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.6);
        }
        
        .statue-container .button.transparent.blue {
            background: rgba(0, 100, 255, 0.3);
            border-color: rgba(0, 100, 255, 0.8);
            box-shadow: 0 0 40px rgba(0, 100, 255, 0.6);
        }
        
        .statue-container .button.transparent.green {
            background: rgba(0, 255, 0, 0.3);
            border-color: rgba(0, 255, 0, 0.8);
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.6);
        }
        
        .statue-container .button.transparent.yellow {
            background: rgba(255, 255, 0, 0.3);
            border-color: rgba(255, 255, 0, 0.8);
            box-shadow: 0 0 40px rgba(255, 255, 0, 0.6);
        }
        
        .button-number {
            font-size: 2em;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        
        #status {
            position: fixed;
            top: 30px;
            right: 30px;
            color: white;
            background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(0,0,0,0.6));
            padding: 20px 25px;
            border-radius: 15px;
            font-size: 20px;
            font-weight: bold;
            border: 3px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        
        #messages {
            position: fixed;
            bottom: 30px;
            left: 30px;
            right: 30px;
            color: white;
            background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(0,0,0,0.6));
            padding: 20px;
            border-radius: 15px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 18px;
            border: 3px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        
        #messages p {
            margin: 10px 0;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .connection-status {
            position: fixed;
            top: 30px;
            left: 30px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: #ff4444;
            border: 3px solid white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }
        
        .connection-status.connected {
            background-color: #44ff44;
            box-shadow: 0 4px 8px rgba(68, 255, 68, 0.5);
        }
        
        /* Animation de pulsation pour les boutons actifs */
        .button.active {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { 
                transform: scale(1);
                box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            }
            50% { 
                transform: scale(1.05);
                box-shadow: 0 12px 24px rgba(0,0,0,0.4);
            }
            100% { 
                transform: scale(1);
                box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            }
        }
        
        /* Messages colorés */
        .message-success { color: #4ade80; }
        .message-error { color: #f87171; font-weight: bold; }
        .message-warning { color: #fbbf24; }
        .message-info { color: #60a5fa; }
    </style>
</head>
<body>
    <div class="connection-status" id="connectionStatus"></div>
    
    <h1 class="title">MUTABILIS</h1>
    
    <div class="game-container">
        <div class="top-buttons">
            <button class="button pink" onclick="pressButton(1)" id="btn1">
                <span class="button-number">1</span>
            </button>
            <button class="button orange" onclick="pressButton(2)" id="btn2">
                <span class="button-number">2</span>
            </button>
            <button class="button pink" onclick="pressButton(3)" id="btn3">
                <span class="button-number">3</span>
            </button>
            <button class="button orange" onclick="pressButton(4)" id="btn4">
                <span class="button-number">4</span>
            </button>
        </div>
        
        <div class="statue-container">
            <button class="button transparent red" onclick="pressButton(5)" id="btn5" style="top: 80px; left: 300px;">
                <span class="button-number">5</span>
            </button>
            <button class="button transparent blue" onclick="pressButton(6)" id="btn6" style="top: 300px; left: 300px;">
                <span class="button-number">6</span>
            </button>
            <button class="button transparent green" onclick="pressButton(7)" id="btn7" style="top: 500px; right: 150px;">
                <span class="button-number">7</span>
            </button>
            <button class="button transparent yellow" onclick="pressButton(8)" id="btn8" style="top: 750px; left: 250px;">
                <span class="button-number">8</span>
            </button>
        </div>
    </div>
    
    <div id="status">Initialisation...</div>
    <div id="messages"></div>

    <script>
        // Configuration simple pour BrightSign
        let isConnected = false;
        let myButtons = [1, 2, 3, 4, 5, 6, 7, 8]; // Par défaut, tous les boutons sont actifs
        let lastButtonPress = 0;
        
        const statusDiv = document.getElementById('status');
        const messagesDiv = document.getElementById('messages');
        const connectionStatus = document.getElementById('connectionStatus');
        
        // Fonction pour ajouter des messages
        function addMessage(message, type = 'info') {
            const messageElement = document.createElement('p');
            const timestamp = new Date().toLocaleTimeString();
            messageElement.textContent = `${timestamp} - ${message}`;
            messageElement.className = `message-${type}`;
            
            messagesDiv.insertBefore(messageElement, messagesDiv.firstChild);
            
            // Limiter à 8 messages
            while (messagesDiv.children.length > 8) {
                messagesDiv.removeChild(messagesDiv.lastChild);
            }
        }
        
        // Fonction pour tester la connexion au serveur
        function testConnection() {
            const serverUrl = `http://${window.location.hostname}:3000`;
            
            fetch(serverUrl, { 
                method: 'HEAD', 
                mode: 'no-cors',
                cache: 'no-cache'
            })
            .then(() => {
                if (!isConnected) {
                    isConnected = true;
                    connectionStatus.classList.add('connected');
                    statusDiv.textContent = 'Connecté - Mode BrightSign';
                    addMessage('Serveur accessible', 'success');
                }
            })
            .catch(() => {
                if (isConnected) {
                    isConnected = false;
                    connectionStatus.classList.remove('connected');
                    statusDiv.textContent = 'Serveur non accessible - Mode autonome';
                    addMessage('Serveur non accessible', 'warning');
                }
            });
        }
        
        // Fonction pour envoyer une commande de bouton
        function sendButtonCommand(buttonId) {
            if (!isConnected) {
                addMessage(`Bouton ${buttonId} activé (mode autonome)`, 'info');
                return Promise.resolve();
            }
            
            const serverUrl = `http://${window.location.hostname}:3000`;
            
            return fetch(`${serverUrl}/button`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ buttonId: buttonId }),
                cache: 'no-cache'
            })
            .then(response => {
                if (response.ok) {
                    addMessage(`Bouton ${buttonId} envoyé au serveur`, 'success');
                } else {
                    addMessage(`Erreur serveur pour bouton ${buttonId}`, 'error');
                }
            })
            .catch(error => {
                addMessage(`Erreur réseau pour bouton ${buttonId}`, 'error');
            });
        }
        
        // Fonction pour presser un bouton
        function pressButton(buttonId) {
            const now = Date.now();
            
            // Éviter les clics multiples rapides
            if (now - lastButtonPress < 300) {
                return;
            }
            lastButtonPress = now;
            
            // Vérifier si le bouton est assigné
            if (!myButtons.includes(buttonId)) {
                addMessage(`Bouton ${buttonId} non assigné`, 'warning');
                return;
            }
            
            // Animation visuelle
            const button = document.getElementById(`btn${buttonId}`);
            if (button) {
                button.style.transform = 'scale(1.3)';
                button.style.boxShadow = '0 0 30px rgba(255,255,255,0.8)';
                
                setTimeout(() => {
                    button.style.transform = '';
                    button.style.boxShadow = '';
                }, 200);
            }
            
            // Envoyer la commande
            sendButtonCommand(buttonId);
            
            // Log local
            console.log(`Bouton ${buttonId} pressé`);
        }
        
        // Fonction pour mettre à jour l'état des boutons
        function updateButtonStates() {
            for (let i = 1; i <= 8; i++) {
                const button = document.getElementById(`btn${i}`);
                if (button) {
                    if (myButtons.includes(i)) {
                        button.classList.add('active');
                        button.style.opacity = '1';
                        button.style.pointerEvents = 'auto';
                    } else {
                        button.classList.remove('active');
                        button.style.opacity = '0.4';
                        button.style.pointerEvents = 'none';
                    }
                }
            }
        }
        
        // Fonction d'initialisation
        function initialize() {
            addMessage('Application BrightSign Simple initialisée', 'success');
            statusDiv.textContent = 'Mode BrightSign Simple - Tous boutons actifs';
            
            // Mettre à jour l'état des boutons
            updateButtonStates();
            
            // Tester la connexion
            testConnection();
            
            // Test périodique de la connexion (toutes les 10 secondes)
            setInterval(testConnection, 10000);
            
            // Afficher les informations de debug
            addMessage(`Hostname: ${window.location.hostname}`, 'info');
            addMessage(`Port: ${window.location.port || '80'}`, 'info');
            addMessage('Tous les boutons sont actifs par défaut', 'info');
        }
        
        // Gestion des erreurs JavaScript
        window.addEventListener('error', function(e) {
            addMessage(`Erreur JS: ${e.message}`, 'error');
            console.error('Erreur JavaScript:', e);
        });
        
        // Gestion de la visibilité de la page
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'visible') {
                addMessage('Page redevenue visible', 'info');
                testConnection();
            }
        });
        
        // Initialisation au chargement de la page
        document.addEventListener('DOMContentLoaded', initialize);
        
        // Initialisation de secours
        setTimeout(function() {
            if (statusDiv.textContent === 'Initialisation...') {
                initialize();
            }
        }, 2000);
    </script>
</body>
</html>
