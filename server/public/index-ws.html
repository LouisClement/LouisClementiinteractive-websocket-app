<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUTABILIS</title>
    <!-- WebSocket natif, pas besoin de script externe -->
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #2b6186;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            height: 100vh; /* Occupe toute la hauteur de l'écran */
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .title {
            color: #000;
            text-align: center;
            font-size: 2em; /* Taille légèrement réduite pour mobile */
            margin: 10px 0;
            font-family: 'Times New Roman', serif;
            flex-shrink: 0; /* Empêche le titre de se réduire */
        }
        .game-area {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1; /* Permet à cette zone de grandir */
            min-height: 0; /* Correction pour le flexbox dans certains navigateurs */
        }
        .top-buttons {
            display: flex;
            justify-content: space-between;
            gap: 5px; /* Espace réduit */
            margin-bottom: 10px; /* Marge réduite */
            width: 100%;
            flex-shrink: 0;
        }
        .image-area {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 500 / 800;
            margin: 10px 0;
            flex-shrink: 1; /* Autorise l'image à se réduire */
            min-height: 0;
        }

        .image-area > img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 1;
        }
        .image-area .button.transparent {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 2; /* S'assure que les boutons sont au-dessus de l'image */
        }
        .image-area .button.transparent:hover {
            transform: scale(1.1);
        }
        .image-area .button.transparent.red {
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
            background: rgba(255, 0, 0, 0.2);
        }
        .image-area .button.transparent.blue {
            box-shadow: 0 0 20px rgba(0, 0, 255, 0.4);
            background: rgba(0, 0, 255, 0.2);
        }
        .image-area .button.transparent.green {
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.4);
            background: rgba(0, 255, 0, 0.2);
        }
        .image-area .button.transparent.yellow {
            box-shadow: 0 0 20px rgba(255, 255, 0, 0.4);
            background: rgba(255, 255, 0, 0.2);
        }
        .button {
            aspect-ratio: 1;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .button:active {
            transform: scale(0.95);
        }
        .button.pink {
            background-color: #d53f8c;
        }
        .button.orange {
            background-color: #ed8936;
        }
        .button.blue {
            background-color: #3182ce; /* Bleu */
        }
        .button.green {
            background-color: #38a169; /* Vert */
        }

        /* BrightSign Admin Interface Styles */
        .admin-container {
            display: none; /* Caché par défaut */
            font-family: Arial, sans-serif;
            background-color: #2b6186;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .admin-container .title {
            color: #000;
            text-align: center;
            font-size: 4em;
            margin-bottom: 20px;
            font-family: 'Times New Roman', serif;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.3);
        }

        .admin-game-area {
            position: relative;
            width: 90vw;
            height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .admin-top-buttons {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 800px;
        }

        .admin-image-area {
            position: relative;
            width: 600px;
            height: 900px;
            background-color: #1a4d6b;
            border-radius: 15px;
            margin: 0 auto;
            background-image: url('./images/statue.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* Fallback si l'image ne se charge pas */
        .admin-image-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, #1a4d6b 25%, transparent 25%), 
                        linear-gradient(-45deg, #1a4d6b 25%, transparent 25%), 
                        linear-gradient(45deg, transparent 75%, #1a4d6b 75%), 
                        linear-gradient(-45deg, transparent 75%, #1a4d6b 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            opacity: 0.1;
            z-index: -1;
        }

        .admin-container .button {
            width: 80px;
            height: 80px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
            font-size: 16px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* Boutons du haut carrés avec couleurs différentes */
        .admin-top-buttons .button {
            border-radius: 10px; /* Carré avec coins arrondis */
        }

        .admin-container .button.pink {
            background-color: #d53f8c;
        }

        .admin-container .button.orange {
            background-color: #ed8936;
        }

        .admin-container .button.blue {
            background-color: #3182ce;
        }

        .admin-container .button.green {
            background-color: #38a169;
        }

        .admin-container .button:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }

        .admin-container .button:active {
            transform: scale(0.95);
        }


        .admin-image-area .button.transparent {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            border: 3px solid rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .admin-image-area .button.transparent:hover {
            transform: scale(1.2);
            background: rgba(255, 255, 255, 0.5);
        }

        .admin-image-area .button.transparent.red {
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
            background: rgba(255, 0, 0, 0.4);
            border-color: rgba(255, 0, 0, 0.8);
        }

        .admin-image-area .button.transparent.blue {
            box-shadow: 0 0 30px rgba(0, 100, 255, 0.6);
            background: rgba(0, 100, 255, 0.4);
            border-color: rgba(0, 100, 255, 0.8);
        }

        .admin-image-area .button.transparent.green {
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.6);
            background: rgba(0, 255, 0, 0.4);
            border-color: rgba(0, 255, 0, 0.8);
        }

        .admin-image-area .button.transparent.yellow {
            box-shadow: 0 0 30px rgba(255, 255, 0, 0.6);
            background: rgba(255, 255, 0, 0.4);
            border-color: rgba(255, 255, 0, 0.8);
        }

        .admin-container .button svg {
            width: 50%;
            height: 50%;
            fill: white;
            filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.5));
        }

        #status-admin {
            display: none; /* Masquer complètement le cadre de statut */
        }

        #messages-admin {
            display: none; /* Masquer complètement les logs */
        }

        #messages-admin p {
            margin: 8px 0;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* Animation de pulsation pour les boutons actifs */
        .admin-container .button.active {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Indicateur de connexion */
        .connection-indicator {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: #ff0000;
            transition: background-color 0.3s ease;
        }

        .connection-indicator.connected {
            background-color: #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        .button.transparent {
            background-color: transparent;
            box-shadow: none;
        }
        .top-buttons .button {
            width: 60px; /* Taille réduite */
            height: 60px;
        }
        .button svg {
            width: 50%;
            height: 50%;
            fill: white;
        }
        #status {
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
            background-color: rgba(0,0,0,0.2);
            border-radius: 10px;
        }
        #messages {
            display: none; /* Cache le cadre des messages */
            color: white;
            margin-top: 20px;
            padding: 10px;
            background-color: rgba(0,0,0,0.2);
            border-radius: 10px;
            max-height: 150px;
            overflow-y: auto;
        }
        #messages p {
            margin: 5px 0;
        }
        .waiting-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(43, 97, 134, 0.95);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            z-index: 10;
            border-radius: 15px;
            text-align: center;
            padding: 20px;
        }
        .hidden {
            display: none !important;
        }
        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #2b6186;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 1.5em;
            z-index: 20;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        #start-button {
            padding: 12px 25px;
            font-size: 1em;
            margin-top: 30px;
            cursor: pointer;
            border: 2px solid white;
            background-color: transparent;
            color: white;
            border-radius: 8px;
            transition: background-color 0.3s, color 0.3s;
        }
        #start-button:hover {
            background-color: white;
            color: #2b6186;
        }
    </style>
</head>

    <script>
    // Placer tout le script à la fin du body garantit que tous les éléments HTML sont chargés.

    // 1. Définir les constantes pour les éléments de la page
    const introOverlay = document.getElementById('intro-overlay');
    const startButton = document.getElementById('start-button');
    const gameContainer = document.getElementById('game-container');
    const adminContainer = document.getElementById('admin-container');
    const waitingOverlay = document.getElementById('waiting-overlay');

    // 2. Déterminer le mode (admin ou non) une seule fois
    const urlParams = new URLSearchParams(window.location.search);
    const isAdmin = urlParams.get('admin') === 'true';

    // 3. Logique de démarrage de l'expérience
    function startExperience() {
        const wsHost = window.location.hostname === 'localhost' ? '127.0.0.1' : window.location.hostname;
        const wsUrl = `ws://${wsHost}:3000${isAdmin ? '?admin=true' : ''}`;
        const ws = new WebSocket(wsUrl);

        const statusDiv = isAdmin ? document.getElementById('status-admin') : document.getElementById('status');
        if (statusDiv) statusDiv.style.fontWeight = 'bold';

        ws.onopen = () => {
            console.log('Connecté au serveur WebSocket');
            if (statusDiv) {
                statusDiv.textContent = 'Connecté';
                statusDiv.style.color = '#28a745';
            }
            ws.send(JSON.stringify({ type: 'joinRoom', roomId: 'mutabilis' }));
        };

        ws.onclose = () => {
            console.log('Déconnecté du serveur WebSocket');
            if (statusDiv) {
                statusDiv.textContent = 'Déconnecté. Rechargez la page.';
                statusDiv.style.color = '#dc3545';
            }
        };

        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                if (data.type === 'userState') {
                    if (isAdmin) {
                        // L'admin voit seulement ses boutons assignés, pas tous
                        updateButtonVisibility(data.buttons || []);
                        updateAdminConnectionStatus(true);
                        updateAdminStatus(data.position, data.buttons || []);
                    } else {
                        // L'utilisateur normal voit ses boutons et l'écran d'attente
                        updateButtonVisibility(data.buttons);
                        if (data.position === 'active') {
                            waitingOverlay.classList.add('hidden');
                        } else {
                            waitingOverlay.classList.remove('hidden');
                        }
                    }
                } else if (data.type === 'buttonMessage' && isAdmin) {
                    // Animation visuelle pour l'admin quand un bouton est pressé
                    const button = document.getElementById(`btn${data.buttonId}`);
                    if (button) {
                        button.style.transform = 'scale(1.3)';
                        button.style.boxShadow = '0 0 30px rgba(255,255,255,0.8)';
                        setTimeout(() => {
                            button.style.transform = '';
                            button.style.boxShadow = '';
                        }, 300);
                    }
                }
            } catch (error) {
                console.error('Error processing message:', error);
            }
        };

        // Attacher les événements de clic à TOUS les boutons une seule fois
        document.querySelectorAll('.button').forEach(button => {
            button.addEventListener('click', () => {
                if (ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ buttonId: parseInt(button.dataset.id) }));
                }
            });
        });
    }

    // 4. Fonction pour gérer la visibilité des boutons
    function updateButtonVisibility(assignedButtons) {
        const container = isAdmin ? adminContainer : gameContainer;
        container.querySelectorAll('.button').forEach(button => {
            const buttonId = parseInt(button.dataset.id);
            if (assignedButtons.includes(buttonId)) {
                button.style.display = 'flex';
                button.style.opacity = '1';
                button.style.pointerEvents = 'auto';
                if (isAdmin) {
                    button.classList.add('active');
                }
            } else {
                button.style.display = 'none';
                button.style.opacity = '0.3';
                button.style.pointerEvents = 'none';
                if (isAdmin) {
                    button.classList.remove('active');
                }
            }
        });
    }

    // 5. Fonctions utilitaires pour l'interface admin BrightSign
    function updateAdminConnectionStatus(connected) {
        const connectionIndicator = document.getElementById('connectionIndicator');
        if (connectionIndicator) {
            if (connected) {
                connectionIndicator.classList.add('connected');
            } else {
                connectionIndicator.classList.remove('connected');
            }
        }
    }

    function addAdminMessage(message, type = 'info') {
        if (!isAdmin) return;
        
        const messagesDiv = document.getElementById('messages-admin');
        if (!messagesDiv) return;
        
        const messageElement = document.createElement('p');
        const timestamp = new Date().toLocaleTimeString();
        messageElement.textContent = `${timestamp} - ${message}`;
        
        // Styles selon le type de message
        if (type === 'error') {
            messageElement.style.color = '#f87171';
            messageElement.style.fontWeight = 'bold';
        } else if (type === 'success') {
            messageElement.style.color = '#4ade80';
        } else if (type === 'warning') {
            messageElement.style.color = '#fbbf24';
        } else {
            messageElement.style.color = '#60a5fa';
        }
        
        messagesDiv.insertBefore(messageElement, messagesDiv.firstChild);
        
        // Limiter à 8 messages
        while (messagesDiv.children.length > 8) {
            messagesDiv.removeChild(messagesDiv.lastChild);
        }
    }

    function updateAdminStatus(position, assignedButtons) {
        if (!isAdmin) return;
        
        const statusDiv = document.getElementById('status-admin');
        if (statusDiv) {
            if (position === 'active' && assignedButtons.length > 0) {
                statusDiv.textContent = `Actif - Boutons: ${assignedButtons.join(', ')}`;
                statusDiv.style.color = '#4ade80';
            } else if (position === 'waiting') {
                statusDiv.textContent = 'En attente...';
                statusDiv.style.color = '#fbbf24';
            } else {
                statusDiv.textContent = 'Connecté - Aucun bouton assigné';
                statusDiv.style.color = '#60a5fa';
            }
        }
    }

    // 6. Point d'entrée principal
    if (isAdmin) {
        introOverlay.style.display = 'none';
        gameContainer.style.display = 'none';
        adminContainer.style.display = 'flex';
        
        // Initialisation spécifique BrightSign
        updateAdminConnectionStatus(false);
        
        startExperience();
    } else {
        adminContainer.style.display = 'none';
        startButton.addEventListener('click', () => {
            introOverlay.style.display = 'none';
            gameContainer.classList.remove('hidden');
            startExperience();
        });
    }

</script>
