<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUTABILIS</title>
    <!-- WebSocket natif, pas besoin de script externe -->
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #2b6186;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            height: 100vh; /* Occupe toute la hauteur de l'écran */
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .title {
            color: #000;
            text-align: center;
            font-size: 2em; /* Taille légèrement réduite pour mobile */
            margin: 10px 0;
            font-family: 'Times New Roman', serif;
            flex-shrink: 0; /* Empêche le titre de se réduire */
        }
        .game-area {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1; /* Permet à cette zone de grandir */
            min-height: 0; /* Correction pour le flexbox dans certains navigateurs */
        }
        .top-buttons {
            display: flex;
            justify-content: space-between;
            gap: 5px; /* Espace réduit */
            margin-bottom: 10px; /* Marge réduite */
            width: 100%;
            flex-shrink: 0;
        }
        .image-area {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 500 / 800;
            background-image: url('images/statue.jpg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            margin: 10px 0;
            flex-shrink: 1; /* Autorise l'image à se réduire */
            min-height: 0;
        }
        .image-area .button.transparent {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .image-area .button.transparent:hover {
            transform: scale(1.1);
        }
        .image-area .button.transparent.red {
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
            background: rgba(255, 0, 0, 0.2);
        }
        .image-area .button.transparent.blue {
            box-shadow: 0 0 20px rgba(0, 0, 255, 0.4);
            background: rgba(0, 0, 255, 0.2);
        }
        .image-area .button.transparent.green {
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.4);
            background: rgba(0, 255, 0, 0.2);
        }
        .image-area .button.transparent.yellow {
            box-shadow: 0 0 20px rgba(255, 255, 0, 0.4);
            background: rgba(255, 255, 0, 0.2);
        }
        .button {
            aspect-ratio: 1;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .button:active {
            transform: scale(0.95);
        }
        .button.pink {
            background-color: #d53f8c;
        }
        .button.orange {
            background-color: #ed8936;
        }
        .button.transparent {
            background-color: transparent;
            box-shadow: none;
        }
        .top-buttons .button {
            width: 60px; /* Taille réduite */
            height: 60px;
        }
        .button svg {
            width: 50%;
            height: 50%;
            fill: white;
        }
        #status {
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
            background-color: rgba(0,0,0,0.2);
            border-radius: 10px;
        }
        #messages {
            color: white;
            margin-top: 20px;
            padding: 10px;
            background-color: rgba(0,0,0,0.2);
            border-radius: 10px;
            max-height: 150px;
            overflow-y: auto;
        }
        #messages p {
            margin: 5px 0;
        }
        .waiting-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(43, 97, 134, 0.95);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            z-index: 10;
            border-radius: 15px;
            text-align: center;
            padding: 20px;
        }
        .hidden {
            display: none !important;
        }
        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #2b6186;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 1.5em;
            z-index: 20;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        #start-button {
            padding: 12px 25px;
            font-size: 1em;
            margin-top: 30px;
            cursor: pointer;
            border: 2px solid white;
            background-color: transparent;
            color: white;
            border-radius: 8px;
            transition: background-color 0.3s, color 0.3s;
        }
        #start-button:hover {
            background-color: white;
            color: #2b6186;
        }
    </style>
</head>
<body>
    <div id="intro-overlay" class="intro-overlay">
        <div>
            <p>Tu vas maintenant piloter l'installation. Clique sur les boutons pour changer les visuels. Quand tu auras retrouvé la bonne combinaison, les décors s'animeront.</p>
            <button id="start-button">Commencer</button>
        </div>
    </div>
    <div id="game-container" class="container hidden">

        <div class="game-area">

                <button class="button orange" data-id="2">
                    <svg viewBox="0 0 24 24"><path d="M9 11.24V7.5C9 6.12 10.12 5 11.5 5S14 6.12 14 7.5v3.74c1.21-.81 2-2.18 2-3.74C16 5.01 13.99 3 11.5 3S7 5.01 7 7.5c0 1.56.79 2.93 2 3.74zm9.84 4.63l-4.54-2.26c-.17-.07-.35-.11-.54-.11H13v-6c0-.83-.67-1.5-1.5-1.5S10 6.67 10 7.5v10.74c-3.6-.76-3.54-.75-3.67-.75-.31 0-.59.13-.79.33l-.79.8 4.94 4.94c.27.27.65.44 1.06.44h6.79c.75 0 1.33-.55 1.44-1.28l.75-5.27c.01-.07.02-.14.02-.2 0-.62-.38-1.16-.91-1.38z"/></svg>
                </button>
                <button class="button pink" data-id="3">
                    <svg viewBox="0 0 24 24"><path d="M9 11.24V7.5C9 6.12 10.12 5 11.5 5S14 6.12 14 7.5v3.74c1.21-.81 2-2.18 2-3.74C16 5.01 13.99 3 11.5 3S7 5.01 7 7.5c0 1.56.79 2.93 2 3.74zm9.84 4.63l-4.54-2.26c-.17-.07-.35-.11-.54-.11H13v-6c0-.83-.67-1.5-1.5-1.5S10 6.67 10 7.5v10.74c-3.6-.76-3.54-.75-3.67-.75-.31 0-.59.13-.79.33l-.79.8 4.94 4.94c.27.27.65.44 1.06.44h6.79c.75 0 1.33-.55 1.44-1.28l.75-5.27c.01-.07.02-.14.02-.2 0-.62-.38-1.16-.91-1.38z"/></svg>
                </button>
                <button class="button orange" data-id="4">
                    <svg viewBox="0 0 24 24"><path d="M9 11.24V7.5C9 6.12 10.12 5 11.5 5S14 6.12 14 7.5v3.74c1.21-.81 2-2.18 2-3.74C16 5.01 13.99 3 11.5 3S7 5.01 7 7.5c0 1.56.79 2.93 2 3.74zm9.84 4.63l-4.54-2.26c-.17-.07-.35-.11-.54-.11H13v-6c0-.83-.67-1.5-1.5-1.5S10 6.67 10 7.5v10.74c-3.6-.76-3.54-.75-3.67-.75-.31 0-.59.13-.79.33l-.79.8 4.94 4.94c.27.27.65.44 1.06.44h6.79c.75 0 1.33-.55 1.44-1.28l.75-5.27c.01-.07.02-.14.02-.2 0-.62-.38-1.16-.91-1.38z"/></svg>
                </button>
            </div>
            <div class="image-area">
                <button class="button transparent red" data-id="5" style="top: 5%; left: 50%;">
                    <svg viewBox="0 0 24 24"><path d="M9 11.24V7.5C9 6.12 10.12 5 11.5 5S14 6.12 14 7.5v3.74c1.21-.81 2-2.18 2-3.74C16 5.01 13.99 3 11.5 3S7 5.01 7 7.5c0 1.56.79 2.93 2 3.74zm9.84 4.63l-4.54-2.26c-.17-.07-.35-.11-.54-.11H13v-6c0-.83-.67-1.5-1.5-1.5S10 6.67 10 7.5v10.74c-3.6-.76-3.54-.75-3.67-.75-.31 0-.59.13-.79.33l-.79.8 4.94 4.94c.27.27.65.44 1.06.44h6.79c.75 0 1.33-.55 1.44-1.28l.75-5.27c.01-.07.02-.14.02-.2 0-.62-.38-1.16-.91-1.38z"/></svg>
                </button>
                <button class="button transparent blue" data-id="6" style="top: 25%; left: 50%;">

                    <svg viewBox="0 0 24 24"><path d="M9 11.24V7.5C9 6.12 10.12 5 11.5 5S14 6.12 14 7.5v3.74c1.21-.81 2-2.18 2-3.74C16 5.01 13.99 3 11.5 3S7 5.01 7 7.5c0 1.56.79 2.93 2 3.74zm9.84 4.63l-4.54-2.26c-.17-.07-.35-.11-.54-.11H13v-6c0-.83-.67-1.5-1.5-1.5S10 6.67 10 7.5v10.74c-3.6-.76-3.54-.75-3.67-.75-.31 0-.59.13-.79.33l-.79.8 4.94 4.94c.27.27.65.44 1.06.44h6.79c.75 0 1.33-.55 1.44-1.28l.75-5.27c.01-.07.02-.14.02-.2 0-.62-.38-1.16-.91-1.38z"/></svg>

                </button>
            </div>
            <div id="status">État de la salle : En attente...</div>
            <div id="messages"></div>
        </div>
    </div>

    <script>
        const introOverlay = document.getElementById('intro-overlay');
        const startButton = document.getElementById('start-button');
        const gameContainer = document.getElementById('game-container');

        function startExperience() {
            const wsHost = window.location.hostname === 'localhost' ? '127.0.0.1' : window.location.hostname;
            const ws = new WebSocket(`ws://${wsHost}:3000`);
            const statusDiv = document.getElementById('status');
            const messagesDiv = document.getElementById('messages');
            const waitingOverlay = document.getElementById('waiting-overlay');
            let myButtons = [];

            ws.onopen = () => {
                console.log('Connecté au serveur WebSocket');
                statusDiv.textContent = 'Connecté au serveur WebSocket';
            };

            ws.onclose = () => {
                console.log('Déconnecté du serveur WebSocket');
                statusDiv.textContent = 'Déconnecté du serveur WebSocket';
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    console.log('Received:', data);
                    
                    if (data.type === 'userState') {
                        myButtons = data.buttons;
                        updateButtonVisibility(data.buttons);

                        if (data.position === 'active') {
                            statusDiv.textContent = 'Connecté - Actif';
                            waitingOverlay.classList.add('hidden');
                        } else {
                            statusDiv.textContent = `Connecté - En attente (Position: ${data.waitingCount})`;
                            waitingOverlay.classList.remove('hidden');
                        }
                    } else if (data.type === 'buttonMessage') {
                        const message = `Bouton ${data.buttonId} pressé par ${data.userId}`;
                        const messageElement = document.createElement('p');
                        messageElement.textContent = message;
                        messagesDiv.insertBefore(messageElement, messagesDiv.firstChild);
                    } else if (data.type === 'error') {
                        const messageElement = document.createElement('p');
                        messageElement.textContent = `Erreur : ${data.message}`;
                        messageElement.style.color = '#ff0000';
                        messagesDiv.insertBefore(messageElement, messagesDiv.firstChild);
                    }
                } catch (error) {
                    console.error('Error processing message:', error);
                }
            };

            function pressButton(buttonId) {
                if (ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ buttonId }));
                } else {
                    console.error('WebSocket non connecté');
                    statusDiv.textContent = 'Non connecté au serveur';
                }
            }

            document.querySelectorAll('.button').forEach(button => {
                button.addEventListener('click', () => {
                    const buttonId = parseInt(button.dataset.id);
                    pressButton(buttonId);
                });
            });

            function updateButtonVisibility(assignedButtons) {
                document.querySelectorAll('.button').forEach(button => {
                    const buttonId = parseInt(button.dataset.id);
                    if (assignedButtons.includes(buttonId)) {
                        button.style.display = 'flex';
                    } else {
                        button.style.display = 'none';
                    }
                });
            }
        }

        startButton.addEventListener('click', () => {
            introOverlay.classList.add('hidden');
            gameContainer.classList.remove('hidden');
            startExperience();
        });
    </script>
</body>
</html>
