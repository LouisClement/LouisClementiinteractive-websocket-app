<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUTABILIS - BrightSign</title>
    <style>
        /* Styles optimisés pour BrightSign */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #2b6186;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .title {
            color: #000;
            text-align: center;
            font-size: 4em;
            margin-bottom: 20px;
            font-family: 'Times New Roman', serif;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.3);
        }
        
        .game-area {
            position: relative;
            width: 90vw;
            height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .top-buttons {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 800px;
        }
        
        .image-area {
            position: relative;
            width: 600px;
            height: 900px;
            background-color: #1a4d6b;
            border: 3px solid #ffffff;
            border-radius: 15px;
            margin: 0 auto;
            background-image: url('./images/statue.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }
        
        /* Fallback si l'image ne se charge pas */
        .image-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, #1a4d6b 25%, transparent 25%), 
                        linear-gradient(-45deg, #1a4d6b 25%, transparent 25%), 
                        linear-gradient(45deg, transparent 75%, #1a4d6b 75%), 
                        linear-gradient(-45deg, transparent 75%, #1a4d6b 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            opacity: 0.1;
            z-index: -1;
        }
        
        .button {
            width: 80px;
            height: 80px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
            font-size: 16px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        
        .button:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }
        
        .button:active {
            transform: scale(0.95);
        }
        
        .button.pink {
            background: linear-gradient(135deg, #d53f8c, #b83280);
        }
        
        .button.orange {
            background: linear-gradient(135deg, #ed8936, #dd7324);
        }
        
        .image-area .button.transparent {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            border: 3px solid rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        
        .image-area .button.transparent:hover {
            transform: scale(1.2);
            background: rgba(255, 255, 255, 0.5);
        }
        
        .image-area .button.transparent.red {
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
            background: rgba(255, 0, 0, 0.4);
            border-color: rgba(255, 0, 0, 0.8);
        }
        
        .image-area .button.transparent.blue {
            box-shadow: 0 0 30px rgba(0, 100, 255, 0.6);
            background: rgba(0, 100, 255, 0.4);
            border-color: rgba(0, 100, 255, 0.8);
        }
        
        .image-area .button.transparent.green {
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.6);
            background: rgba(0, 255, 0, 0.4);
            border-color: rgba(0, 255, 0, 0.8);
        }
        
        .image-area .button.transparent.yellow {
            box-shadow: 0 0 30px rgba(255, 255, 0, 0.6);
            background: rgba(255, 255, 0, 0.4);
            border-color: rgba(255, 255, 0, 0.8);
        }
        
        .button svg {
            width: 50%;
            height: 50%;
            fill: white;
            filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.5));
        }
        
        #status {
            position: fixed;
            top: 20px;
            right: 20px;
            color: white;
            background-color: rgba(0,0,0,0.7);
            padding: 15px 20px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            border: 2px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
        }
        
        #messages {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            color: white;
            background-color: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 10px;
            max-height: 150px;
            overflow-y: auto;
            font-size: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
        }
        
        #messages p {
            margin: 8px 0;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        /* Animation de pulsation pour les boutons actifs */
        .button.active {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        /* Styles pour les messages d'erreur */
        .error-message {
            color: #ff6b6b !important;
            font-weight: bold;
            background-color: rgba(255, 0, 0, 0.1);
            padding: 5px 10px;
            border-radius: 5px;
            border-left: 4px solid #ff6b6b;
        }
        
        /* Indicateur de connexion */
        .connection-indicator {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: #ff0000;
            transition: background-color 0.3s ease;
        }
        
        .connection-indicator.connected {
            background-color: #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }
    </style>
</head>
<body>

                    <svg viewBox="0 0 24 24"><path d="M9 11.24V7.5C9 6.12 10.12 5 11.5 5S14 6.12 14 7.5v3.74c1.21-.81 2-2.18 2-3.74C16 5.01 13.99 3 11.5 3S7 5.01 7 7.5c0 1.56.79 2.93 2 3.74zm9.84 4.63l-4.54-2.26c-.17-.07-.35-.11-.54-.11H13v-6c0-.83-.67-1.5-1.5-1.5S10 6.67 10 7.5v10.74c-3.6-.76-3.54-.75-3.67-.75-.31 0-.59.13-.79.33l-.79.8 4.94 4.94c.27.27.65.44 1.06.44h6.79c.75 0 1.33-.55 1.44-1.28l.75-5.27c.01-.07.02-.14.02-.2 0-.62-.38-1.16-.91-1.38z"/></svg>

                    <svg viewBox="0 0 24 24"><path d="M9 11.24V7.5C9 6.12 10.12 5 11.5 5S14 6.12 14 7.5v3.74c1.21-.81 2-2.18 2-3.74C16 5.01 13.99 3 11.5 3S7 5.01 7 7.5c0 1.56.79 2.93 2 3.74zm9.84 4.63l-4.54-2.26c-.17-.07-.35-.11-.54-.11H13v-6c0-.83-.67-1.5-1.5-1.5S10 6.67 10 7.5v10.74c-3.6-.76-3.54-.75-3.67-.75-.31 0-.59.13-.79.33l-.79.8 4.94 4.94c.27.27.65.44 1.06.44h6.79c.75 0 1.33-.55 1.44-1.28l.75-5.27c.01-.07.02-.14.02-.2 0-.62-.38-1.16-.91-1.38z"/></svg>
                </button>
            </div>
            <div class="image-area">
                <button class="button transparent red" onclick="pressButton(5)" id="btn5" style="top: 60px; left: 260px;">
                    <svg viewBox="0 0 24 24"><path d="M9 11.24V7.5C9 6.12 10.12 5 11.5 5S14 6.12 14 7.5v3.74c1.21-.81 2-2.18 2-3.74C16 5.01 13.99 3 11.5 3S7 5.01 7 7.5c0 1.56.79 2.93 2 3.74zm9.84 4.63l-4.54-2.26c-.17-.07-.35-.11-.54-.11H13v-6c0-.83-.67-1.5-1.5-1.5S10 6.67 10 7.5v10.74c-3.6-.76-3.54-.75-3.67-.75-.31 0-.59.13-.79.33l-.79.8 4.94 4.94c.27.27.65.44 1.06.44h6.79c.75 0 1.33-.55 1.44-1.28l.75-5.27c.01-.07.02-.14.02-.2 0-.62-.38-1.16-.91-1.38z"/></svg>
                </button>

    </div>
    
    <div id="status">Initialisation...</div>
    <div id="messages"></div>

    <script>
        // Configuration optimisée pour BrightSign
        let ws = null;
        let reconnectInterval = null;
        let connectionAttempts = 0;
        const maxReconnectAttempts = 10;
        
        const statusDiv = document.getElementById('status');
        const messagesDiv = document.getElementById('messages');
        const connectionIndicator = document.getElementById('connectionIndicator');
        let myButtons = [];
        
        // Fonction pour obtenir l'adresse IP du serveur
        function getServerAddress() {
            const hostname = window.location.hostname;
            // Pour BrightSign, utiliser l'adresse IP directe si possible
            if (hostname === 'localhost' || hostname === '127.0.0.1') {
                return '127.0.0.1';
            }
            return hostname;
        }
        
        // Fonction de connexion WebSocket avec retry automatique
        function connectWebSocket() {
            try {
                const serverAddress = getServerAddress();
                const wsUrl = `ws://${serverAddress}:3000`;
                
                console.log(`Tentative de connexion à: ${wsUrl}`);
                statusDiv.textContent = `Connexion à ${serverAddress}...`;
                
                ws = new WebSocket(wsUrl);
                
                ws.onopen = function() {
                    console.log('Connecté au serveur WebSocket');
                    statusDiv.textContent = 'Connecté au serveur';
                    connectionIndicator.classList.add('connected');
                    connectionAttempts = 0;
                    
                    // Arrêter les tentatives de reconnexion
                    if (reconnectInterval) {
                        clearInterval(reconnectInterval);
                        reconnectInterval = null;
                    }
                    
                    addMessage('Connexion établie avec succès', 'success');
                };
                
                ws.onclose = function(event) {
                    console.log('Déconnecté du serveur WebSocket', event);
                    statusDiv.textContent = 'Déconnecté - Tentative de reconnexion...';
                    connectionIndicator.classList.remove('connected');
                    
                    addMessage('Connexion fermée - Reconnexion...', 'warning');
                    
                    // Tentative de reconnexion automatique
                    if (connectionAttempts < maxReconnectAttempts) {
                        setTimeout(connectWebSocket, 2000 + (connectionAttempts * 1000));
                        connectionAttempts++;
                    } else {
                        statusDiv.textContent = 'Connexion impossible - Vérifiez le serveur';
                        addMessage('Impossible de se reconnecter au serveur', 'error');
                    }
                };
                
                ws.onerror = function(error) {
                    console.error('Erreur WebSocket:', error);
                    statusDiv.textContent = 'Erreur de connexion';
                    connectionIndicator.classList.remove('connected');
                    addMessage('Erreur de connexion WebSocket', 'error');
                };
                
                ws.onmessage = function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        console.log('Message reçu:', data);
                        
                        if (data.type === 'userState') {
                            myButtons = data.buttons || [];
                            updateButtonStates();
                            
                            if (data.position === 'active') {
                                statusDiv.textContent = `Actif - Boutons: ${myButtons.join(', ')}`;
                                addMessage(`Vous êtes maintenant actif avec les boutons: ${myButtons.join(', ')}`, 'success');
                            } else {
                                statusDiv.textContent = `En attente - Position: ${data.waitingCount || 'N/A'}`;
                                addMessage(`En file d'attente - Position: ${data.waitingCount || 'N/A'}`, 'info');
                            }
                        } else if (data.type === 'buttonMessage') {
                            const message = `Bouton ${data.buttonId} activé`;
                            addMessage(message, 'info');
                            
                            // Animation visuelle du bouton pressé
                            const button = document.getElementById(`btn${data.buttonId}`);
                            if (button) {
                                button.style.transform = 'scale(1.2)';
                                setTimeout(() => {
                                    button.style.transform = '';
                                }, 300);
                            }
                        } else if (data.type === 'error') {
                            addMessage(`Erreur: ${data.message}`, 'error');
                        }
                    } catch (error) {
                        console.error('Erreur lors du traitement du message:', error);
                        addMessage('Erreur lors du traitement du message', 'error');
                    }
                };
                
            } catch (error) {
                console.error('Erreur lors de la création de la connexion WebSocket:', error);
                statusDiv.textContent = 'Erreur de configuration';
                addMessage('Erreur de configuration WebSocket', 'error');
            }
        }
        
        // Fonction pour mettre à jour l'état visuel des boutons
        function updateButtonStates() {
            for (let i = 1; i <= 8; i++) {
                const button = document.getElementById(`btn${i}`);
                if (button) {
                    if (myButtons.includes(i)) {
                        button.classList.add('active');
                        button.style.opacity = '1';
                        button.style.pointerEvents = 'auto';
                    } else {
                        button.classList.remove('active');
                        button.style.opacity = '0.5';
                        button.style.pointerEvents = 'none';
                    }
                }
            }
        }
        
        // Fonction pour ajouter des messages avec types
        function addMessage(message, type = 'info') {
            const messageElement = document.createElement('p');
            messageElement.textContent = `${new Date().toLocaleTimeString()} - ${message}`;
            
            if (type === 'error') {
                messageElement.classList.add('error-message');
            } else if (type === 'success') {
                messageElement.style.color = '#4ade80';
            } else if (type === 'warning') {
                messageElement.style.color = '#fbbf24';
            }
            
            messagesDiv.insertBefore(messageElement, messagesDiv.firstChild);
            
            // Limiter le nombre de messages affichés
            while (messagesDiv.children.length > 10) {
                messagesDiv.removeChild(messagesDiv.lastChild);
            }
        }
        
        // Fonction pour presser un bouton
        function pressButton(buttonId) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addMessage('WebSocket non connecté', 'error');
                statusDiv.textContent = 'Non connecté au serveur';
                return;
            }
            
            if (!myButtons.includes(buttonId)) {
                addMessage(`Bouton ${buttonId} non assigné`, 'warning');
                return;
            }
            
            try {
                ws.send(JSON.stringify({ buttonId: buttonId }));
                addMessage(`Bouton ${buttonId} envoyé`, 'info');
            } catch (error) {
                console.error('Erreur lors de l\'envoi:', error);
                addMessage('Erreur lors de l\'envoi du bouton', 'error');
            }
        }
        
        // Fonction de test de connectivité
        function testConnectivity() {
            const testUrl = `http://${getServerAddress()}:3000`;
            fetch(testUrl, { method: 'HEAD', mode: 'no-cors' })
                .then(() => {
                    addMessage('Serveur HTTP accessible', 'success');
                })
                .catch(() => {
                    addMessage('Serveur HTTP non accessible', 'warning');
                });
        }
        
        // Initialisation
        document.addEventListener('DOMContentLoaded', function() {
            addMessage('Application BrightSign initialisée', 'info');
            testConnectivity();
            
            // Démarrer la connexion WebSocket après un court délai
            setTimeout(connectWebSocket, 1000);
            
            // Ajouter des gestionnaires d'événements pour le debugging
            window.addEventListener('error', function(e) {
                addMessage(`Erreur JavaScript: ${e.message}`, 'error');
            });
            
            // Test périodique de la connexion
            setInterval(function() {
                if (!ws || ws.readyState !== WebSocket.OPEN) {
                    if (connectionAttempts < maxReconnectAttempts) {
                        connectWebSocket();
                    }
                }
            }, 10000); // Test toutes les 10 secondes
        });
        
        // Gestion de la visibilité de la page (pour BrightSign)
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'visible') {
                addMessage('Page redevenue visible', 'info');
                if (!ws || ws.readyState !== WebSocket.OPEN) {
                    connectWebSocket();
                }
            }
        });
    </script>
</body>
</html>
